appId: com.picora.app
productName: Picora
directories:
  output: dist
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/models
    to: models
  - from: resources/icon.png
    to: icon.png
win:
  target: nsis
  icon: resources/icon.png
nsis:
  oneClick: true
  perMachine: true
mac:
  target: dmg
  icon: resources/icon.icns
linux:
  target: AppImage
  icon: resources/icon.png
